<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>March 18</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Quicksand', sans-serif;
      overflow-y: scroll;
      overflow-x: hidden;
      scroll-behavior: smooth;
      margin: 0;
      padding: 0;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: none;
      border-radius: 0;
      padding: 0;
      max-width: 100%;
      width: 100%;
      text-align: center;
      box-shadow: none;
      animation: cardIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.7) translateY(40px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── Full Screen Sections ── */
    .full-screen {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      padding: 2rem;
    }

    #coffee-section {
      overflow: hidden;
    }

    .coffee-bg-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
      z-index: 0;
    }

    .coffee-bg-slide.active {
      opacity: 1;
    }

    .coffee-bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
    }

    #coffee-section .card {
      z-index: 2;
    }

    #wraps-section {
      background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                  url('https://www.datocms-assets.com/129288/1725461275-peanut-butter-wraps.jpg');
    }

    .welcome-section {
      max-width: 700px;
      width: 100%;
    }

    .wrap-section {
      max-width: 700px;
      width: 100%;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 3rem;
      color: #ff6b9d;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px rgba(255, 107, 157, 0.3);
    }

    .subtitle {
      color: #666;
      font-size: 1.2rem;
      margin-bottom: 2rem;
      font-weight: 600;
    }

    .content {
      color: #333;
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    .emoji {
      font-size: 4rem;
      margin: 1rem 0;
      animation: bounce 2s ease-in-out infinite;
    }

    /* Full screen text styling */
    #coffee-section h1 {
      color: #fff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
      font-size: 4rem;
    }

    #coffee-section .subtitle {
      color: #fff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
      font-size: 1.5rem;
    }

    #coffee-section .content {
      color: #fff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
      font-size: 1.2rem;
      max-width: 600px;
    }

    #wraps-section h2 {
      color: #fff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
    }

    #wraps-section .wrap-description {
      color: #fff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
      font-size: 1.1rem;
      max-width: 600px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .btn {
      padding: 1.1rem 2.8rem;
      border: none;
      border-radius: 50px;
      font-family: 'Quicksand', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      background: linear-gradient(135deg, #ff6b9d, #ff8fab);
      color: #fff;
      box-shadow: 0 6px 24px rgba(255, 107, 157, 0.45);
      margin-top: 1.5rem;
    }

    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 30px rgba(255, 107, 157, 0.6);
    }

    .btn:active {
      transform: scale(0.95);
    }

    /* ── Wrap Section ── */
    .wrap-section {
      text-align: center;
      animation: cardIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .wrap-title {
      font-family: 'Pacifico', cursive;
      font-size: 3.5rem;
      color: #fff;
      margin-bottom: 1.5rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
    }

    .wrap-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1.2rem;
      margin: 1.5rem 0;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .wrap-image {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease;
      height: 150px;
    }

    .wrap-image:hover {
      transform: scale(1.05);
    }

    .wrap-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .wrap-description {
      color: #333;
      font-size: 0.95rem;
      line-height: 1.6;
      margin: 1rem 0;
      font-weight: 500;
    }

    /* ── Coffee Gallery ── */
    .coffee-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1rem;
      margin: 2rem auto;
      max-width: 600px;
      width: 100%;
    }

    .coffee-gallery-item {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      transition: transform 0.3s ease;
      height: 120px;
    }

    .coffee-gallery-item:hover {
      transform: scale(1.05);
    }

    .coffee-gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

<!-- Coffee Shop Section -->
<div class="full-screen" id="coffee-section">
  <div class="coffee-bg-slide active" style="background-image: url('https://cuplacoffee.com/wp-content/uploads/2025/06/cozy-coffee-shops-near-me-for-studying-working-and-weekend-sips-featured.jpg')"></div>
  <div class="coffee-bg-slide" style="background-image: url('https://images.stockcake.com/public/8/6/d/86d4659b-fb86-4bf5-abd2-ec6b7ed145f2_large/cozy-coffee-shop-stockcake.jpg')"></div>
  <div class="coffee-bg-slide" style="background-image: url('https://jukeboxy-media.s3.amazonaws.com/blog/wp-content/uploads/2022/02/19095301/music-for-coffee-shop.jpg')"></div>
  <div class="coffee-bg-slide" style="background-image: url('https://www.coffeeshopibiza.com/wp-content/uploads/2021/09/Coffee-shop.jpg')"></div>
  <div class="coffee-bg-slide" style="background-image: url('https://images.squarespace-cdn.com/content/v1/5c705ecb51f4d4c18997db3f/5bb10f0b-bef4-4f1d-aaff-53957d6594ef/IMG_2331+4.jpg')"></div>
  <div class="coffee-bg-overlay"></div>
  <div class="card">
    <div class="welcome-section" id="welcome-section">
      <h1>March 18 ☕</h1>
      <p class="subtitle">Cozy Coffee Shop Study Time</p>
      <div class="emoji">☕</div>
      <div class="content">
        <p>We start the day at a cozy coffee shop, studying together ❤️</p>
        <p>A perfect blend of productivity and yummyness! ✨</p>
      </div>
    </div>
  </div>
</div>

<!-- Wrap Wednesday Section -->
<div class="full-screen" id="wraps-section">
  <div class="card wrap-section">
    <h2 class="wrap-title">Wrap Wednesday at the Bhatia's! 🌯</h2>
    <p class="wrap-description">
      Mausi makes wraps 😋
    </p>
    <div class="wrap-images">
      <div class="wrap-image">
        <img src="https://www.datocms-assets.com/129288/1725461275-peanut-butter-wraps.jpg" alt="Peanut butter wraps">
      </div>
      <div class="wrap-image">
        <img src="https://evergreenkitchen.ca/wp-content/uploads/2024/06/Halloumi-Wraps-with-Hot-Honey-Evergreen-Kitchen-1.jpg" alt="Halloumi wraps">
      </div>
      <div class="wrap-image">
        <img src="https://plantbasedonabudget.com/wp-content/uploads/2013/06/Roasted-Red-Pepper-Wraps-Plant-Based-on-a-Budget-1-2.jpg" alt="Roasted red pepper wraps">
      </div>
    </div>
    <p class="wrap-description">
    </p>
    <button class="btn" id="continue-btn">Continue to March 19</button>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const slides = document.querySelectorAll('.coffee-bg-slide');
    let current = 0;

    setInterval(function() {
      slides[current].classList.remove('active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('active');
    }, 4000);

    const continueBtn = document.getElementById('continue-btn');

    if (continueBtn) {
      continueBtn.addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = 'march19.html';
      });
    }
  });
</script>

</body>
</html>
