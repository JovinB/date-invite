<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>March 19</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Quicksand', sans-serif;
      overflow: hidden;
    }

    .full-screen {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
      z-index: 0;
    }

    .bg-slide.active {
      opacity: 1;
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1;
    }

    .content-wrapper {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      max-width: 700px;
      animation: fadeUp 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 4rem;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6);
      margin-bottom: 1rem;
    }

    .subtitle {
      color: #ffe0ee;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 2rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .emoji {
      font-size: 4rem;
      margin: 1rem 0;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .description {
      color: #fff;
      font-size: 1.2rem;
      line-height: 1.8;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
      margin-bottom: 2rem;
    }

    .btn {
      padding: 1.1rem 2.8rem;
      border: none;
      border-radius: 50px;
      font-family: 'Quicksand', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      background: linear-gradient(135deg, #ff6b9d, #ff8fab);
      color: #fff;
      box-shadow: 0 6px 24px rgba(255, 107, 157, 0.55);
      margin-top: 1.5rem;
    }

    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 30px rgba(255, 107, 157, 0.7);
    }

    .btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

<div class="full-screen">
  <div class="bg-slide active" style="background-image: url('https://hips.hearstapps.com/hmg-prod/images/date-night-ideas-244-660c4867ade7a.jpg?crop=1xw:0.9225xh;0,0.179xh')"></div>
  <div class="bg-slide" style="background-image: url('https://cdn.getyourguide.com/image/format=auto,fit=crop,gravity=auto,quality=60,width=450,height=450,dpr=2/tour_img/95f0c980e8910c8ff65923b342d3dc12020a1e36ae6dc32bb89550cd46be1e14.png')"></div>
  <div class="bg-slide" style="background-image: url('https://orchidrepublic.com/cdn/shop/articles/Blog_Banner-_Romantic_Flowers_1024x576.png?v=1771528488')"></div>
  <div class="bg-slide" style="background-image: url('https://media.istockphoto.com/id/466195919/photo/twilight-romance-on-the-sea.jpg?s=612x612&w=0&k=20&c=6KfIeBp5oOjLRDfzJJ4Orefahh5ogzosxvTvo8gCjlw=')"></div>
  <div class="bg-overlay"></div>
  <div class="content-wrapper">
    <h1>March 19 💕</h1>
    <p class="subtitle">Date Night</p>
    <div class="emoji">🌹</div>
    <p class="description">
      A special evening just for us ✨
    </p>
    <button class="btn" id="continue-btn">Continue to March 20</button>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const slides = document.querySelectorAll('.bg-slide');
    let current = 0;

    setInterval(function() {
      slides[current].classList.remove('active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('active');
    }, 4000);

    const continueBtn = document.getElementById('continue-btn');
    if (continueBtn) {
      continueBtn.addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = 'march20.html';
      });
    }
  });
</script>

</body>
</html>
