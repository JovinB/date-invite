<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>March 22</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #0a0e27 0%, #1a1060 50%, #2d1b69 100%);
      font-family: 'Quicksand', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Stars ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
      opacity: 0;
    }
    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(1); }
      to   { opacity: 0.9; transform: scale(1.4); }
    }

    /* ── Departure screen ── */
    .depart-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      text-align: center;
      padding: 2rem;
    }

    .depart-screen h1 {
      font-family: 'Pacifico', cursive;
      font-size: 3.5rem;
      color: #ffd6e7;
      text-shadow: 0 0 20px rgba(255,150,180,0.5);
      margin-bottom: 1rem;
      animation: fadeUp 0.8s ease both;
    }

    .plane-emoji {
      font-size: 5rem;
      margin: 1.5rem 0;
      animation: planeBounce 2s ease-in-out infinite;
    }

    @keyframes planeBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fly-btn {
      padding: 1.1rem 2.8rem;
      border: none;
      border-radius: 50px;
      font-family: 'Quicksand', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      background: linear-gradient(135deg, #ff6b9d, #ff8fab);
      color: #fff;
      box-shadow: 0 6px 24px rgba(255,107,157,0.5);
      margin-top: 1rem;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    .fly-btn:hover  { transform: scale(1.08); box-shadow: 0 10px 30px rgba(255,107,157,0.65); }
    .fly-btn:active { transform: scale(0.95); }

    .depart-screen.hidden { display: none; }

    /* ── Map ── */
    .map-container {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .map-container.show { display: flex; }

    .map-background {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .city {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #e8e8ff;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    .city-dot {
      width: 14px;
      height: 14px;
      background: #ffd6e7;
      border-radius: 50%;
      margin-bottom: 0.5rem;
      box-shadow: 0 0 12px rgba(255,214,231,0.9);
    }

    /* Ottawa top-right, Winnipeg bottom-left (reverse of march17) */
    .ottawa   { top: 15%; right: 10%; flex-direction: column-reverse; }
    .ottawa .city-dot { margin-bottom: 0; margin-top: 0.5rem; }
    .winnipeg { bottom: 15%; left: 10%; }

    .flight-plane {
      position: absolute;
      font-size: 2.5rem;
      opacity: 0;
      z-index: 10;
      /* start at Ottawa */
      top: calc(15% - 10px);
      right: calc(10% + 7px);
    }

    @keyframes flyHome {
      0% {
        opacity: 0;
        top: calc(15% - 10px);
        right: calc(10% + 7px);
        transform: rotate(200deg);
      }
      10% { opacity: 1; }
      50% {
        top: 40%;
        right: 50%;
        transform: rotate(210deg);
      }
      90% { opacity: 1; }
      100% {
        opacity: 0;
        top: calc(85% - 30px);
        right: calc(90% - 30px);
        transform: rotate(220deg);
      }
    }

    .flight-plane.flying {
      animation: flyHome 5s ease-in-out forwards;
    }

    /* ── Arrival screen ── */
    .arrival-screen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      text-align: center;
      padding: 2rem;
    }

    .arrival-screen.show {
      display: flex;
      animation: fadeIn 1.2s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    .arrival-screen h1 {
      font-family: 'Pacifico', cursive;
      font-size: 3.5rem;
      color: #ffd6e7;
      text-shadow: 0 0 30px rgba(255,150,180,0.6);
      margin-bottom: 1rem;
    }

    .heart {
      font-size: 6rem;
      animation: heartbeat 1.2s ease-in-out infinite;
      margin: 1rem 0;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.15); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.1); }
      56%       { transform: scale(1); }
    }

    .arrival-screen .tagline {
      font-family: 'Quicksand', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #a8c0ff;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- Departure Screen -->
<div class="depart-screen" id="depart-screen">
  <h1>March 22 ✈️</h1>
  <div class="plane-emoji">✈️</div>
  <button class="fly-btn" id="fly-btn">Fly home with cutie 💕</button>
</div>

<!-- Map -->
<div class="map-container" id="map-container">
  <div class="map-background">
    <div class="city ottawa">
      Ottawa
      <div class="city-dot"></div>
    </div>
    <div class="city winnipeg">
      <div class="city-dot"></div>
      Winnipeg
    </div>
    <div class="flight-plane" id="flight-plane">✈️</div>
  </div>
</div>

<!-- Arrival Screen -->
<div class="arrival-screen" id="arrival-screen">
  <h1>Back Home Together</h1>
  <div class="heart">❤️</div>
  <p class="tagline">5 more days together 💕</p>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 140; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  document.getElementById('fly-btn').addEventListener('click', function() {
    document.getElementById('depart-screen').classList.add('hidden');

    const map = document.getElementById('map-container');
    map.classList.add('show');

    setTimeout(function() {
      const plane = document.getElementById('flight-plane');
      plane.classList.add('flying');

      setTimeout(function() {
        map.classList.remove('show');
        document.getElementById('arrival-screen').classList.add('show');
      }, 5200);
    }, 400);
  });
</script>

</body>
</html>
