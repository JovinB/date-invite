<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>March 20</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Quicksand', sans-serif;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* ── Full screen section ── */
    .full-screen {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Background slideshow ── */
    .bg-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
      z-index: 0;
    }

    .bg-slide.active { opacity: 1; }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.42);
      z-index: 1;
    }

    /* ── Content over background ── */
    .content-wrapper {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      max-width: 680px;
      animation: fadeUp 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .content-wrapper h1 {
      font-family: 'Pacifico', cursive;
      font-size: 4rem;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.6);
      margin-bottom: 1rem;
    }

    .content-wrapper .subtitle {
      color: #ffe0c8;
      font-size: 1.5rem;
      font-weight: 600;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      margin-bottom: 1.5rem;
    }

    .emoji {
      font-size: 4rem;
      margin: 1rem 0;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .content-wrapper .description {
      color: #fff;
      font-size: 1.2rem;
      line-height: 1.8;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
      margin-bottom: 2rem;
    }

    .scroll-hint {
      color: rgba(255,255,255,0.75);
      font-size: 0.95rem;
      margin-top: 1rem;
      letter-spacing: 0.05em;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1; }
    }

    /* ── Bains fam section ── */
    #bains-section {
      min-height: 100vh;
      background: linear-gradient(135deg, #2c1a0e 0%, #4a2c17 50%, #2c1a0e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }

    #bains-section h2 {
      font-family: 'Pacifico', cursive;
      font-size: 3.2rem;
      color: #f5c89a;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      margin-bottom: 1rem;
    }

    #bains-section .subtitle {
      color: #e8b88a;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 2.5rem;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      max-width: 620px;
      width: 100%;
      margin: 0 auto 2.5rem;
    }

    .photo-grid img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.45);
      transition: transform 0.3s ease;
    }

    .photo-grid img:hover { transform: scale(1.04); }

    .btn {
      padding: 1.1rem 2.8rem;
      border: none;
      border-radius: 50px;
      font-family: 'Quicksand', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      background: linear-gradient(135deg, #ff6b9d, #ff8fab);
      color: #fff;
      box-shadow: 0 6px 24px rgba(255,107,157,0.5);
      margin-top: 1rem;
    }

    .btn:hover  { transform: scale(1.08); box-shadow: 0 10px 30px rgba(255,107,157,0.65); }
    .btn:active { transform: scale(0.95); }
  </style>
</head>
<body>

<!-- Coffee with Mausi -->
<div class="full-screen" id="coffee-section">
  <div class="bg-slide active" style="background-image: url('https://cuplacoffee.com/wp-content/uploads/2025/06/cozy-coffee-shops-near-me-for-studying-working-and-weekend-sips-featured.jpg')"></div>
  <div class="bg-slide" style="background-image: url('https://images.stockcake.com/public/8/6/d/86d4659b-fb86-4bf5-abd2-ec6b7ed145f2_large/cozy-coffee-shop-stockcake.jpg')"></div>
  <div class="bg-slide" style="background-image: url('https://jukeboxy-media.s3.amazonaws.com/blog/wp-content/uploads/2022/02/19095301/music-for-coffee-shop.jpg')"></div>
  <div class="bg-slide" style="background-image: url('https://www.coffeeshopibiza.com/wp-content/uploads/2021/09/Coffee-shop.jpg')"></div>
  <div class="bg-overlay"></div>
  <div class="content-wrapper">
    <h1>March 20 ☕</h1>
    <p class="subtitle">Coffee with Mausi</p>
    <div class="emoji">☕</div>
    <p class="description">Catching up with Mausi over warm drinks 🤍</p>
    <p class="scroll-hint">↓ scroll down ↓</p>
  </div>
</div>

<!-- Hangout with the Bains Fam -->
<div id="bains-section">
  <h2>Bains Fam Hangout 🏠</h2>
  <p class="subtitle">Fun games and good vibes only ✨</p>
  <div class="photo-grid">
    <img src="https://static.vecteezy.com/system/resources/thumbnails/072/346/203/small/friends-enjoying-board-game-at-cafe-on-sunny-day-photo.jpg" alt="Game night photo 1" />
    <img src="https://cdn.apartmenttherapy.info/image/upload/f_jpg,q_auto:eco,c_fill,g_auto,w_1500,ar_16:9/stock%2Fcustom%20stock%2F2022-11-custom-stock%2Fgames-0228-edit" alt="Game night photo 2" />
  </div>
  <button class="btn" id="continue-btn">Continue to March 21</button>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const slides = document.querySelectorAll('.bg-slide');
    let current = 0;

    setInterval(function() {
      slides[current].classList.remove('active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('active');
    }, 4000);

    const continueBtn = document.getElementById('continue-btn');
    if (continueBtn) {
      continueBtn.addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = 'march21.html';
      });
    }
  });
</script>

</body>
</html>
