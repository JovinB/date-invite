<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Calendar: March 17–22</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0e27 0%, #0d1117 50%, #1a0d2e 100%);
      font-family: 'Quicksand', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Stars background ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
      opacity: 0;
    }
    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(1); }
      to   { opacity: 0.9; transform: scale(1.4); }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 28px;
      padding: 4.5rem 5rem;
      max-width: 700px;
      width: 90%;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      animation: cardIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    /* ── Calendar ── */
    .calendar {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    .calendar th {
      padding: 1rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #e8e8ff;
      font-weight: 600;
      font-size: 1rem;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.7) translateY(40px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }

    .icon { font-size: 3.5rem; margin-bottom: 0.5rem; display: block; animation: bounce 1.8s ease-in-out infinite; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 3rem;
      color: #ffd6e7;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(255,150,180,0.5);
    }

    .subtitle {
      color: #a8c0ff;
      font-size: 1.3rem;
      letter-spacing: 0.05em;
      margin-bottom: 2.5rem;
      font-weight: 600;
    }

    /* ── Details box ── */
    .details {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1.8rem;
      text-align: left;
    }
    .detail-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #e8e8ff;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.45rem 0;
    }
    .detail-row:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.08); }
    .detail-row .emoji { font-size: 1.3rem; flex-shrink: 0; }

    /* ── Personal message ── */
    .message-box {
      background: rgba(255, 214, 231, 0.08);
      border-left: 3px solid #ff8fab;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 2rem;
      color: #ffd6e7;
      font-size: 0.95rem;
      line-height: 1.6;
      text-align: left;
      font-style: italic;
    }

    /* ── Question ── */
    .question {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 1.5rem;
    }

    /* ── Buttons ── */
    .buttons { display: flex; gap: 1rem; justify-content: center; position: relative; }

    .btn {
      padding: 1.1rem 2.8rem;
      border: none;
      border-radius: 50px;
      font-family: 'Quicksand', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-yes {
      background: linear-gradient(135deg, #ff6b9d, #ff8fab);
      color: #fff;
      box-shadow: 0 6px 24px rgba(255,107,157,0.45);
    }
    .btn-yes:hover { transform: scale(1.08); box-shadow: 0 10px 30px rgba(255,107,157,0.6); }

    .btn-no {
      background: rgba(255,255,255,0.12);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.2);
      position: relative; /* start beside the yes button */
    }
    .btn-no:hover { background: rgba(255,255,255,0.18); }

    /* ── Yes screen ── */
    .yes-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .yes-screen h2 {
      font-family: 'Pacifico', cursive;
      font-size: 2rem;
      color: #ffd6e7;
      margin: 1rem 0 0.5rem;
    }
    .yes-screen p { color: #a8c0ff; font-size: 1rem; font-weight: 600; }
    .confetti-burst { font-size: 3rem; }

    .card.show-yes .invite-content { display: none; }
    .card.show-yes .yes-screen { display: flex; }
  </style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<div class="card" id="card">
  <!-- invite content -->
  <div class="invite-content" id="invite-screen">
    <h1>Jojo's &amp; Anisha's Week of Fun</h1>
    <p class="subtitle">Cutie do you want to join me?</p>
    <div class="buttons" id="btn-container">
      <button class="btn btn-yes" id="yes-btn">Yes!</button>
      <button class="btn btn-no" id="no-btn">No</button>
    </div>
  </div>

  <!-- calendar screen, hidden initially -->
  <div class="calendar-screen" id="calendar-screen" style="display:none;">
    <h1>Week of March 17–22</h1>
    <table class="calendar">
      <tr>
        <th>Mon<br>Mar 17</th>
        <th>Tue<br>Mar 18</th>
        <th>Wed<br>Mar 19</th>
        <th>Thu<br>Mar 20</th>
        <th>Fri<br>Mar 21</th>
        <th>Sat<br>Mar 22</th>
      </tr>
    </table>
  </div>
</div>

<script>
  // ── Stars ──
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  // ── Shooting Stars ──
  // Removed - shooting stars disabled

  // ── Interaction logic ──
  const noBtn   = document.getElementById('no-btn');
  const yesBtn  = document.getElementById('yes-btn');
  const card    = document.getElementById('card');
  const inviteScreen = document.getElementById('invite-screen');
  const calendarScreen = document.getElementById('calendar-screen');

  let fleeing = false;
  let isAbsolute = false;

  function flee() {
    if (fleeing) return;
    fleeing = true;

    // Switch to absolute positioning on first flee
    if (!isAbsolute) {
      isAbsolute = true;
      const rect = noBtn.getBoundingClientRect();
      const cardRect = card.getBoundingClientRect();
      noBtn.style.position = 'absolute';
      noBtn.style.left = (rect.left - cardRect.left) + 'px';
      noBtn.style.top  = (rect.top  - cardRect.top)  + 'px';
    }

    const cardRect = card.getBoundingClientRect();
    const noBtnRect = noBtn.getBoundingClientRect();
    const margin = 10;

    const maxX = cardRect.width  - noBtnRect.width  - margin;
    const maxY = cardRect.height - noBtnRect.height - margin;

    let newX, newY, tries = 0;
    do {
      newX = Math.random() * maxX + margin / 2;
      newY = Math.random() * maxY + margin / 2;
      tries++;
    } while (
      tries < 20 &&
      Math.abs(newX - (parseFloat(noBtn.style.left) || 0)) < 60 &&
      Math.abs(newY - (parseFloat(noBtn.style.top)  || 0)) < 40
    );

    // Ensure bounded
    newX = Math.max(0, Math.min(newX, maxX));
    newY = Math.max(0, Math.min(newY, maxY));

    noBtn.style.transition = 'left 0.25s cubic-bezier(0.34,1.56,0.64,1), top 0.25s cubic-bezier(0.34,1.56,0.64,1)';
    noBtn.style.left = newX + 'px';
    noBtn.style.top  = newY + 'px';

    setTimeout(() => { fleeing = false; }, 300);
  }

  noBtn.addEventListener('mouseover', flee);
  noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); flee(); });

  yesBtn.addEventListener('click', () => {
    // Navigate to march 17 page
    window.location.href = 'march17.html';
  });
</script>
</body>
</html>
